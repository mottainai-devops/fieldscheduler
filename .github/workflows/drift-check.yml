name: Drift Check (Non-Blocking Warning)

# T19 Item 4: driftCheck wired as non-blocking warning on every PR.
# If findings are detected (exit code 1), output is posted as a PR comment
# but the check does NOT fail and does NOT block merge.
# See ENGAGEMENT_RECORD T19 and scripts/driftCheck.ts for details.

on:
  pull_request:
    branches: [ main ]

jobs:
  drift-check:
    name: Schema & Handler Drift Check
    runs-on: ubuntu-latest
    # continue-on-error: true ensures the job never blocks merge
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run drift check
        id: drift
        # Capture output and exit code; never fail the step
        run: |
          set +e
          OUTPUT=$(pnpm drift:check 2>&1)
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          # Write output to a file for the comment step (multiline safe)
          echo "$OUTPUT" > /tmp/drift_output.txt
          # Always exit 0 — this is a warning-only check
          exit 0

      - name: Post drift findings as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('/tmp/drift_output.txt', 'utf8');
            const exitCode = '${{ steps.drift.outputs.exit_code }}';
            const hasFindings = exitCode !== '0';

            const header = hasFindings
              ? '## ⚠️ Drift Check — Findings Detected (Non-Blocking)\n\nThis PR introduces or exposes schema/handler drift. **Merge is not blocked.** Review findings before closing the PR.\n\n'
              : '## ✅ Drift Check — No Findings\n\n';

            const body = header + '```\n' + output + '\n```\n\n' +
              '_Run `pnpm drift:check` locally to reproduce. See [scripts/driftCheck.ts](../blob/main/scripts/driftCheck.ts) and ENGAGEMENT_RECORD T19 for context._';

            // Find existing drift check comment to update rather than spam
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('Drift Check')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
