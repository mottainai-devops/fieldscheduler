name: Deploy Fieldscheduler

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        env:
          VITE_APP_TITLE: "Mottainai Field Scheduler"
          VITE_APP_LOGO: "/favicon.ico"
          VITE_APP_ID: ${{ secrets.VITE_APP_ID }}
          VITE_OAUTH_PORTAL_URL: ${{ secrets.VITE_OAUTH_PORTAL_URL }}
        run: pnpm build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload dist to server via rsync
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o LogLevel=ERROR -q" \
            dist/ \
            ubuntu@${{ secrets.DEPLOY_HOST }}:/home/ubuntu/field-worker-scheduler/dist/

      - name: Run database migrations
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o LogLevel=ERROR \
            -q \
            ubuntu@${{ secrets.DEPLOY_HOST }} << 'ENDSSH'
          set -e
          cd /home/ubuntu/field-worker-scheduler
          echo "Running database schema sync..."
          # Use drizzle-kit push (direct schema diff) instead of migrate,
          # because the migration journal is out of sync with the live DB.
          # drizzle-kit push compares schema.ts to the live DB and applies
          # only the missing columns/tables, skipping already-existing ones.
          npx drizzle-kit push --force
          echo "Schema sync complete!"
          ENDSSH

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o LogLevel=ERROR \
            -q \
            ubuntu@${{ secrets.DEPLOY_HOST }} << 'ENDSSH'
          set -e
          cd /home/ubuntu/field-worker-scheduler
          echo "Restarting application..."
          pm2 restart field-worker-scheduler
          pm2 save
          echo "Deployment complete!"
          pm2 list
          ENDSSH
