name: Deploy Fieldscheduler

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        env:
          VITE_APP_TITLE: "Mottainai Field Scheduler"
          VITE_APP_LOGO: "/favicon.ico"
          VITE_APP_ID: ${{ secrets.VITE_APP_ID }}
          VITE_OAUTH_PORTAL_URL: ${{ secrets.VITE_OAUTH_PORTAL_URL }}
        run: pnpm build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload dist to server via rsync
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o LogLevel=ERROR -q" \
            dist/ \
            ubuntu@${{ secrets.DEPLOY_HOST }}:/home/ubuntu/field-worker-scheduler/dist/

      - name: Run database migrations
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o LogLevel=ERROR \
            -q \
            ubuntu@${{ secrets.DEPLOY_HOST }} << 'ENDSSH'
          set -e
          cd /home/ubuntu/field-worker-scheduler
          echo "Running targeted database migrations..."
          # Inline idempotent migration: add fieldManagerId to users table.
          # Uses node -e to avoid needing a script file on the server.
          # The .env file on the server provides DATABASE_URL.
          node -e "
            const mysql = require('mysql2/promise');
            require('dotenv').config();
            const url = process.env.DATABASE_URL;
            if (!url) { console.error('No DATABASE_URL'); process.exit(1); }
            mysql.createConnection(url).then(async conn => {
              const [rows] = await conn.execute(\"SELECT COLUMN_NAME FROM INFORMATION_SCHEMA.COLUMNS WHERE TABLE_SCHEMA=DATABASE() AND TABLE_NAME='users' AND COLUMN_NAME='fieldManagerId'\");
              if (rows.length) { console.log('fieldManagerId already exists, skipping'); }
              else { await conn.execute(\"ALTER TABLE users ADD COLUMN fieldManagerId int NULL\"); console.log('fieldManagerId column added'); }
              await conn.end();
            }).catch(e => { console.error(e.message); process.exit(1); });
          "
          echo "Migrations complete!"
          ENDSSH

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o LogLevel=ERROR \
            -q \
            ubuntu@${{ secrets.DEPLOY_HOST }} << 'ENDSSH'
          set -e
          cd /home/ubuntu/field-worker-scheduler
          echo "Restarting application..."
          pm2 restart field-worker-scheduler
          pm2 save
          echo "Deployment complete!"
          pm2 list
          ENDSSH
