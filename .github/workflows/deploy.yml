name: Deploy Fieldscheduler
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  deploy:
    name: Build & Deploy to Production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Clean previous build artifacts
        run: rm -rf dist/
      - name: Build frontend
        env:
          VITE_APP_TITLE: "Mottainai Field Scheduler"
          VITE_APP_LOGO: "/favicon.ico"
          VITE_APP_VERSION: "3.5.0"
          VITE_SENTRY_DSN: ""
          VITE_APP_ID: ${{ secrets.VITE_APP_ID }}
          VITE_OAUTH_PORTAL_URL: ${{ secrets.VITE_OAUTH_PORTAL_URL }}
        run: pnpm build
      - name: Bundle server for deployment
        run: |
          mkdir -p deploy-package
          cp -r dist deploy-package/
          cp package.json pnpm-lock.yaml deploy-package/
          cp -r server deploy-package/
          cp -r shared deploy-package/ 2>/dev/null || true
          cp -r drizzle deploy-package/ 2>/dev/null || true
          cp start.sh deploy-package/
          chmod +x deploy-package/start.sh
          tar -czf fieldscheduler-deploy.tar.gz -C deploy-package .
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts
      - name: Upload to server
        run: |
          scp -i ~/.ssh/deploy_key fieldscheduler-deploy.tar.gz root@${{ secrets.DEPLOY_HOST }}:/tmp/fieldscheduler-deploy.tar.gz
      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.DEPLOY_HOST }} << 'ENDSSH'
            set -e
            echo "=== Extracting new build ==="
            mkdir -p /var/www/mottainai-fieldscheduler-new
            tar -xzf /tmp/fieldscheduler-deploy.tar.gz -C /var/www/mottainai-fieldscheduler-new
            echo "=== Installing production dependencies ==="
            cd /var/www/mottainai-fieldscheduler-new
            npm install --production --legacy-peer-deps 2>&1 | tail -10
            echo "=== Swapping deployment ==="
            if [ -f /var/www/mottainai-fieldscheduler/.env ]; then
              cp /var/www/mottainai-fieldscheduler/.env /var/www/mottainai-fieldscheduler-new/.env || true
            fi
            rsync -a --checksum /var/www/mottainai-fieldscheduler-new/ /var/www/mottainai-fieldscheduler/
            echo "=== Restarting PM2 process ==="
            pm2 restart mottainai-fieldscheduler --update-env
            pm2 save
            sleep 8
            pm2 show mottainai-fieldscheduler | grep -E "status|uptime|restart"
            pm2 logs mottainai-fieldscheduler --lines 20 --nostream 2>&1 || true
            rm -rf /var/www/mottainai-fieldscheduler-new /tmp/fieldscheduler-deploy.tar.gz
            echo "Deploy complete!"
          ENDSSH
